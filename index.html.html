<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>Bluepoint — 에너지 분류체계</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

/* ── RESET & BASE ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F5F4F0;
  --surface:  #FAFAF7;
  --ink:      #1A1A18;
  --ink2:     #3A3A36;
  --muted:    #8A8A80;
  --line:     #DEDBD2;

  --A: #1B4FD8;  --A-l: #E8EFFE;  --A-m: #BDD0FF;
  --B: #0A6E47;  --B-l: #E6F5EE;  --B-m: #9EDCC0;
  --C: #B03A00;  --C-l: #FDF0E8;  --C-m: #F8C49A;
  --D: #5B2D8E;  --D-l: #F2ECF9;  --D-m: #D4BAF0;

  --trl-hi: #059669; --trl-hi-bg: #D1FAE5;
  --trl-md: #B45309; --trl-md-bg: #FEF3C7;
  --trl-lo: #DC2626; --trl-lo-bg: #FEE2E2;
  --gap-c:  #EF4444; --gap-bg:    #FFF1F2;
}

body {
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ──────────────────────────────────── */
.topbar {
  height: 56px;
  background: var(--ink);
  display: flex;
  align-items: center;
  padding: 0 36px;
  gap: 20px;
  flex-shrink: 0;
}
.topbar-logo {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #E2E8F0;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.topbar-sep { width: 1px; height: 18px; background: #334155; }
.topbar-title {
  font-size: 13px;
  font-weight: 500;
  color: #CBD5E1;
}
.topbar-right {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #64748B;
}

/* ── LAYOUT ──────────────────────────────────── */
.layout {
  flex: 1;
  display: grid;
  grid-template-columns: 220px 1fr 220px;
  min-height: calc(100vh - 56px - 32px);
}

/* ── SIDE PANELS ─────────────────────────────── */
.panel {
  padding: 24px 18px;
  border-right: 1px solid var(--line);
  overflow-y: auto;
}
.panel.right { border-right: none; border-left: 1px solid var(--line); }

.panel-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .16em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.sector-block { margin-bottom: 18px; }
.sector-head {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 7px;
}
.sector-swatch {
  width: 9px; height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}
.sector-name {
  font-size: 11px;
  font-weight: 700;
}
.company-list {
  padding-left: 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.company-item {
  font-size: 10px;
  color: var(--ink2);
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: background .15s;
}
.company-item:hover { background: rgba(0,0,0,.05); }
.company-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.trl-badge {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  font-weight: 500;
  padding: 1px 4px;
  border-radius: 3px;
  margin-left: auto;
  flex-shrink: 0;
}

/* TRL legend */
.trl-legend { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--line); }
.trl-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 5px;
  font-size: 9.5px;
}
.trl-swatch {
  width: 24px; height: 10px;
  border-radius: 2px;
  border: 1px solid;
  flex-shrink: 0;
}

/* right panel — gaps */
.gap-block { margin-bottom: 16px; }
.gap-section-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .14em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.gap-item {
  display: flex;
  gap: 7px;
  margin-bottom: 8px;
  align-items: flex-start;
}
.gap-badge {
  width: 18px; height: 18px;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}
.gap-text { font-size: 9.5px; color: var(--ink2); line-height: 1.55; }
.gap-text strong { display: block; font-size: 10px; color: var(--ink); font-weight: 600; }

/* ── WHEEL CENTER ────────────────────────────── */
.wheel-center {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}
#wheelSvg {
  width: min(660px, 100%);
  height: min(660px, 100%);
  overflow: visible;
  cursor: default;
}

/* ── TOOLTIP ─────────────────────────────────── */
#tooltip {
  position: fixed;
  background: #FFFFFF;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  width: 260px;
  box-shadow: 0 8px 32px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.08);
  pointer-events: none;
  opacity: 0;
  transition: opacity .18s;
  z-index: 9999;
}
#tooltip.visible { opacity: 1; }
.tt-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}
.tt-name {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.35;
  color: var(--ink);
}
.tt-trl {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.tt-sector {
  font-size: 10px;
  font-weight: 600;
  margin-bottom: 8px;
  padding: 2px 7px;
  border-radius: 4px;
  display: inline-block;
}
.tt-divider { border: none; border-top: 1px solid var(--line); margin: 8px 0; }
.tt-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 3px 10px;
  font-size: 10px;
  margin-bottom: 8px;
}
.tt-label { color: var(--muted); font-weight: 500; white-space: nowrap; }
.tt-value { color: var(--ink2); }
.tt-summary {
  font-size: 10.5px;
  color: var(--ink2);
  line-height: 1.6;
  background: var(--bg);
  border-radius: 6px;
  padding: 7px 9px;
}

/* ── FOOTER ──────────────────────────────────── */
footer {
  height: 32px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 20px;
  flex-shrink: 0;
  background: var(--surface);
}
.footer-note {
  font-size: 9px;
  color: var(--muted);
}
.footer-note b { color: var(--ink2); font-weight: 600; }

/* ── DOT HOVER EFFECT ────────────────────────── */
.company-dot-svg {
  cursor: pointer;
  transition: r .15s;
}
.company-dot-svg:hover { r: 13; }
</style>
</head>

<div class="topbar">

/* ═══════════════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════════════ */
const NS = 'http://www.w3.org/2000/svg';
const R = { core: 52, r1: 92, r2: 144, r3: 200, r4: 258, label: 310, rim: 322 };
const RING_RADII = [
  (R.core + R.r1) / 2,
  (R.r1 + R.r2) / 2,
  (R.r2 + R.r3) / 2,
  (R.r3 + R.r4) / 2,
];
const TRL_STYLE = (n) => n >= 7
  ? { bg: '#D1FAE5', color: '#059669', label: `TRL ${n}` }
  : n >= 4
  ? { bg: '#FEF3C7', color: '#B45309', label: `TRL ${n}` }
  : { bg: '#FEE2E2', color: '#DC2626', label: `TRL ${n}` };

function polar(angle, r) {
  const rad = (angle - 90) * Math.PI / 180;
  return { x: r * Math.cos(rad), y: r * Math.sin(rad) };
}

function arcPath(a1, a2, r1, r2) {
  const s1 = polar(a1, r2), e1 = polar(a2, r2);
  const s2 = polar(a2, r1), e2 = polar(a1, r1);
  const lg = (a2 - a1) > 180 ? 1 : 0;
  return `M${s1.x},${s1.y} A${r2},${r2} 0 ${lg},1 ${e1.x},${e1.y}
          L${s2.x},${s2.y} A${r1},${r1} 0 ${lg},0 ${e2.x},${e2.y}Z`;
}

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

/* ═══════════════════════════════════════════════════════════════
   BUILD SVG WHEEL
   ═══════════════════════════════════════════════════════════════ */
function buildWheel() {
  const svg = document.getElementById('wheelSvg');
  svg.innerHTML = '';

  // Defs
  const defs = svgEl('defs');
  const rg = svgEl('radialGradient', { id: 'coreGrad', cx: '50%', cy: '50%', r: '50%' });
  [['0%','#1e293b'],['100%','#0c1220']].forEach(([off,col]) => {
    const s = svgEl('stop', { offset: off }); s.setAttribute('stop-color', col); rg.appendChild(s);
  });
  defs.appendChild(rg);
  svg.appendChild(defs);

  // Background
  svg.appendChild(svgEl('circle', { cx:0, cy:0, r: R.rim + 6, fill:'#F8F8F4' }));

  // Sector fills (4 rings each)
  const ringPairs = [[R.core,R.r1],[R.r1,R.r2],[R.r2,R.r3],[R.r3,R.r4]];
  SECTORS.forEach(sec => {
    ringPairs.forEach(([r1,r2], ri) => {
      const op = [0.16, 0.11, 0.08, 0.06][ri];
      svg.appendChild(svgEl('path', {
        d: arcPath(sec.startAngle, sec.endAngle, r1, r2),
        fill: sec.color, 'fill-opacity': op,
        stroke: sec.color, 'stroke-width': 0.4, 'stroke-opacity': 0.25,
      }));
    });
  });

  // Ring separator circles
  [R.r1, R.r2, R.r3, R.r4].forEach(r => {
    svg.appendChild(svgEl('circle', {
      cx:0, cy:0, r,
      fill:'none', stroke:'#BFC7CE',
      'stroke-width': 0.7, 'stroke-dasharray':'3,3'
    }));
  });

  // Sector dividers
  SECTORS.forEach(sec => {
    [sec.startAngle, sec.endAngle].forEach(ang => {
      const p1 = polar(ang, R.core), p2 = polar(ang, R.r4);
      svg.appendChild(svgEl('line', {
        x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y,
        stroke:'#94A3B8', 'stroke-width':0.8, 'stroke-dasharray':'4,3'
      }));
    });
  });

  // Sector outer label band
  SECTORS.forEach(sec => {
    svg.appendChild(svgEl('path', {
      d: arcPath(sec.startAngle + 1, sec.endAngle - 1, R.r4 + 4, R.label - 4),
      fill: sec.color, 'fill-opacity': 0.88,
    }));
    const mid = (sec.startAngle + sec.endAngle) / 2;
    const lp = polar(mid, (R.r4 + R.label) / 2);
    const lines = sec.name.split('·').length > 1
      ? [sec.id + '.', sec.name.replace(sec.id + '. ', '').split('·').join('\u00B7')]
      : sec.name.split(' ').reduce((acc,w,i) => {
          if(i===0) acc.push(w); else { const last=acc[acc.length-1]; last.length+w.length<9?acc[acc.length-1]+=' '+w:acc.push(w); } return acc;
        }, []);
    // simple 2-line split by sector
    const shortLabels = {
      A: ['A.', '수요 전환·효율'],
      B: ['B.', '전력 시스템'],
      C: ['C.', '저배출 연료', '·탄소 관리'],
      D: ['D.', '자원·순환', '·공급망'],
    };
    const lbls = shortLabels[sec.id];
    const g = svgEl('g', { transform:`translate(${lp.x},${lp.y})` });
    lbls.forEach((line, i) => {
      const t = svgEl('text', {
        x:0, y:(i - (lbls.length-1)/2)*12,
        'text-anchor':'middle','dominant-baseline':'middle',
        fill:'#FFFFFF','font-size':9.5,'font-weight':700,
        'font-family':'Noto Sans KR, sans-serif',
      });
      t.textContent = line;
      g.appendChild(t);
    });
    svg.appendChild(g);
  });

  // Ring labels (left side)
  [
    { r: RING_RADII[0], label: '① 생산·양산' },
    { r: RING_RADII[1], label: '② 저장·변환' },
    { r: RING_RADII[2], label: '③ 이송·인프라' },
    { r: RING_RADII[3], label: '④ 소비·활용' },
  ].forEach(rl => {
    const p = polar(263, rl.r);
    const t = svgEl('text', {
      x:p.x, y:p.y,
      'text-anchor':'middle','dominant-baseline':'middle',
      fill:'#64748B','font-size':7.5,'font-weight':500,
      'font-family':'DM Mono, monospace','letter-spacing':'0.04em',
    });
    t.textContent = rl.label;
    svg.appendChild(t);
  });

  // Core circle
  svg.appendChild(svgEl('circle', { cx:0, cy:0, r:R.core, fill:'url(#coreGrad)' }));
  ['에너지', '분류체계'].forEach((line, i) => {
    const t = svgEl('text', {
      x:0, y:(i-0.5)*14,
      'text-anchor':'middle','dominant-baseline':'middle',
      fill:'#CBD5E1','font-size':11,'font-weight':600,
      'font-family':'Noto Sans KR, sans-serif',
    });
    t.textContent = line;
    svg.appendChild(t);
  });

  // Gap dots
  GAPS.forEach(g => {
    const sec = SECTORS.find(s => s.id === g.sector);
    const r = RING_RADII[g.ring - 1];
    const p = polar(g.angle, r);
    const gEl = svgEl('g', { class:'gap-group', style:'cursor:pointer' });

    gEl.appendChild(svgEl('circle', {
      cx:p.x, cy:p.y, r:12,
      fill:'#FFF1F2', stroke:'#EF4444',
      'stroke-width':1.5, 'stroke-dasharray':'3,2', opacity:0.93
    }));
    const qt = svgEl('text', {
      x:p.x, y:p.y,
      'text-anchor':'middle','dominant-baseline':'middle',
      fill:'#EF4444','font-size':13,'font-weight':700,
      'font-family':'DM Mono, monospace', 'pointer-events':'none',
    });
    qt.textContent = '?';
    gEl.appendChild(qt);

    // gap label lines
    const lp = polar(g.angle, r + 24);
    const labelLines = g.label.split('\n');
    const lg = svgEl('g', { transform:`translate(${lp.x},${lp.y})`, 'pointer-events':'none' });
    labelLines.forEach((line, i) => {
      const t = svgEl('text', {
        x:0, y:(i-(labelLines.length-1)/2)*9,
        'text-anchor':'middle','dominant-baseline':'middle',
        fill:'#EF4444','font-size':7.5,'font-weight':600,
        'font-family':'Noto Sans KR, sans-serif',
      });
      t.textContent = line;
      lg.appendChild(t);
    });
    gEl.appendChild(lg);

    // gap tooltip
    gEl.addEventListener('mouseenter', (e) => showGapTooltip(e, g, sec));
    gEl.addEventListener('mousemove', moveTooltip);
    gEl.addEventListener('mouseleave', hideTooltip);
    svg.appendChild(gEl);
  });

  // Company dots
  COMPANIES.forEach(co => {
    const sec = SECTORS.find(s => s.id === co.sector);
    const r = RING_RADII[co.ring - 1];
    const p = polar(co.angle, r);
    const trl = TRL_STYLE(co.trl);

    const gEl = svgEl('g', { class:'company-group', style:'cursor:pointer' });

    // outer TRL ring
    gEl.appendChild(svgEl('circle', {
      cx:p.x, cy:p.y, r:10,
      fill: trl.bg, stroke: trl.color, 'stroke-width':1.3, opacity:0.95
    }));
    // sector color inner
    gEl.appendChild(svgEl('circle', {
      cx:p.x, cy:p.y, r:5,
      fill: sec.color, opacity:0.92
    }));

    // Full company name label (not abbreviated)
    const lp = polar(co.angle, r + 20);
    const nameLines = co.name.length > 8
      ? [co.name.replace('주식회사 ','').replace(' 주식회사','')]
      : [co.name];
    // Use full abbreviated name for SVG label (space is tight), but tooltip shows full name
    const displayName = co.abbr;
    const lblT = svgEl('text', {
      x:lp.x, y:lp.y,
      'text-anchor':'middle','dominant-baseline':'middle',
      fill: sec.color,'font-size':7.5,'font-weight':700,
      'font-family':'Noto Sans KR, sans-serif',
    });
    lblT.textContent = displayName;
    gEl.appendChild(lblT);

    gEl.addEventListener('mouseenter', (e) => showCompanyTooltip(e, co, sec, trl));
    gEl.addEventListener('mousemove', moveTooltip);
    gEl.addEventListener('mouseleave', hideTooltip);

    svg.appendChild(gEl);
  });

  // Rim
  svg.appendChild(svgEl('circle', {
    cx:0, cy:0, r:R.rim,
    fill:'none', stroke:'#CBD5E1','stroke-width':1
  }));
}

/* ═══════════════════════════════════════════════════════════════
   TOOLTIP
   ═══════════════════════════════════════════════════════════════ */
const tooltip = document.getElementById('tooltip');

function showCompanyTooltip(e, co, sec, trl) {
  const vcLabel = co.vc;
  tooltip.innerHTML = `
    <div class="tt-header">
      <div class="tt-name">${co.name}</div>
      <div class="tt-trl" style="background:${trl.bg};color:${trl.color}">${trl.label}</div>
    </div>
    <div class="tt-sector" style="background:${sec.light};color:${sec.color}">${sec.name}</div>
    <hr class="tt-divider">
    <div class="tt-grid">
      <span class="tt-label">설립</span><span class="tt-value">${co.founded}년</span>
      <span class="tt-label">대표자</span><span class="tt-value">${co.ceo}</span>
      <span class="tt-label">밸류체인</span><span class="tt-value">${vcLabel}</span>
      <span class="tt-label">태그</span><span class="tt-value">${co.tags.join(', ')}</span>
    </div>
    <div class="tt-summary">${co.summary}</div>
  `;
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function showGapTooltip(e, g, sec) {
  tooltip.innerHTML = `
    <div class="tt-header">
      <div class="tt-name" style="color:#EF4444">📍 소싱 공백 영역</div>
    </div>
    <div class="tt-sector" style="background:${sec.light};color:${sec.color}">${sec.name}</div>
    <hr class="tt-divider">
    <div class="tt-grid">
      <span class="tt-label">공백</span><span class="tt-value" style="font-weight:600">${g.label.replace('\n',' ')}</span>
    </div>
    <div class="tt-summary" style="margin-bottom:8px">${g.desc}</div>
    <div style="font-size:9.5px;color:#1B4FD8;background:#EEF2FF;border-radius:5px;padding:6px 8px">
      <b>소싱 키워드:</b> ${g.keywords}
    </div>
  `;
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const x = e.clientX, y = e.clientY;
  const tw = 260, th = 260;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = x + 14, top = y + 14;
  if (left + tw > vw - 10) left = x - tw - 14;
  if (top + th > vh - 10) top = y - th - 14;
  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

/* ═══════════════════════════════════════════════════════════════
   LEFT PANEL — company list by sector
   ═══════════════════════════════════════════════════════════════ */
function buildLeftPanel() {
  const panel = document.getElementById('leftPanel');
  panel.innerHTML = `<div class="panel-label">포트폴리오 분류</div>`;

  SECTORS.forEach(sec => {
    const companies = COMPANIES.filter(c => c.sector === sec.id);
    const block = document.createElement('div');
    block.className = 'sector-block';

    const head = document.createElement('div');
    head.className = 'sector-head';
    head.innerHTML = `
      <div class="sector-swatch" style="background:${sec.color}"></div>
      <div class="sector-name" style="color:${sec.color}">${sec.name}</div>
    `;
    block.appendChild(head);

    const list = document.createElement('div');
    list.className = 'company-list';
    companies.forEach(co => {
      const trl = TRL_STYLE(co.trl);
      const item = document.createElement('div');
      item.className = 'company-item';
      item.innerHTML = `
        <span class="company-dot" style="background:${sec.color}"></span>
        <span style="flex:1">${co.name}</span>
        <span class="trl-badge" style="background:${trl.bg};color:${trl.color}">${trl.label}</span>
      `;
      list.appendChild(item);
    });
    block.appendChild(list);
    panel.appendChild(block);
  });

  // TRL legend at bottom
  const legend = document.createElement('div');
  legend.className = 'trl-legend';
  legend.innerHTML = `
    <div class="panel-label">TRL 기준 (KETEP 2025)</div>
    <div class="trl-row">
      <div class="trl-swatch" style="background:#D1FAE5;border-color:#059669"></div>
      <span style="color:#059669;font-weight:600">TRL 7–9</span>
      <span style="color:var(--muted);font-size:9px">상용화·양산</span>
    </div>
    <div class="trl-row">
      <div class="trl-swatch" style="background:#FEF3C7;border-color:#B45309"></div>
      <span style="color:#B45309;font-weight:600">TRL 4–6</span>
      <span style="color:var(--muted);font-size:9px">시제품·실증</span>
    </div>
    <div class="trl-row">
      <div class="trl-swatch" style="background:#FEE2E2;border-color:#DC2626"></div>
      <span style="color:#DC2626;font-weight:600">TRL 1–3</span>
      <span style="color:var(--muted);font-size:9px">개념·연구 초기</span>
    </div>
  `;
  panel.appendChild(legend);
}

/* ═══════════════════════════════════════════════════════════════
   RIGHT PANEL — gaps only (no timeline, no synergy)
   ═══════════════════════════════════════════════════════════════ */
function buildRightPanel() {
  const panel = document.getElementById('rightPanel');
  panel.innerHTML = `<div class="panel-label">소싱 공백 영역</div>
  <div style="font-size:9px;color:var(--muted);margin-bottom:14px;line-height:1.6">
    기준: WEO 2025 중요도 × KETEP 국내 공백 × 스타트업 진입 가능성<br>
    <span style="color:#EF4444">?</span> 버튼에 마우스를 올리면 상세 정보가 표시됩니다.
  </div>`;

  SECTORS.forEach(sec => {
    const secGaps = GAPS.filter(g => g.sector === sec.id);
    if (!secGaps.length) return;

    const block = document.createElement('div');
    block.className = 'gap-block';

    const title = document.createElement('div');
    title.className = 'gap-section-title';
    title.textContent = sec.name;
    block.appendChild(title);

    secGaps.forEach(g => {
      const item = document.createElement('div');
      item.className = 'gap-item';
      item.innerHTML = `
        <div class="gap-badge" style="background:#FFF1F2;color:#EF4444;border:1px solid #FECACA">?</div>
        <div class="gap-text">
          <strong>${g.label.replace('\n', ' ')}</strong>
          ${g.keywords}
        </div>
      `;
      block.appendChild(item);
    });
    panel.appendChild(block);
  });

  // Note about removed sections
  const note = document.createElement('div');
  note.style.cssText = 'margin-top:auto;padding-top:14px;border-top:1px solid var(--line);font-size:9px;color:var(--muted);line-height:1.7';
  note.innerHTML = `
    <b style="color:var(--ink2)">※ 논의 필요 항목</b><br>
    소싱 타임라인(즉시/6~12개월) 구분 기준 및 포트폴리오 시너지 연결은 내부 검증 후 추가 예정입니다.
  `;
  panel.appendChild(note);
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
buildWheel();
buildLeftPanel();
buildRightPanel();
</script>
